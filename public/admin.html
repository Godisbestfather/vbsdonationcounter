<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7dd3fc" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>VBS Staff — Add Donations</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .panel {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 20px;
      color: #64748b;
    }

    .row {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e2e8f0;
    }

    .row:last-of-type {
      border-bottom: 0;
    }

    label {
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    input, select, button {
      font: inherit;
      border-radius: 10px;
      padding: 10px 12px;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
    }

    .controls input {
      flex: 1;
      width: auto;
    }

    select {
      width: 100%;
      border: 1px solid #cbd5e1;
    }

    button {
      border: 0;
      background: #0ea5e9;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.full {
      width: 100%;
    }

    .reset {
      margin-top: 16px;
      background: #ef4444;
      width: 100%;
    }

    .logout {
      margin-top: 12px;
      background: #e2e8f0;
      color: #334155;
      width: 100%;
    }

    .status {
      margin-top: 12px;
      min-height: 1.2em;
      color: #059669;
      font-weight: 600;
    }

    .status.error {
      color: #dc2626;
    }

    .hidden {
      display: none;
    }

    .admin-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .lock-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="panel" id="loginScreen">
    <div class="lock-icon" aria-hidden="true">🔒</div>
    <h1>Staff Login</h1>
    <p>Enter the admin password to add donations.</p>

    <form id="loginForm">
      <div class="row">
        <label for="loginPassword">Password</label>
        <input
          id="loginPassword"
          type="password"
          placeholder="Admin password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="full">Unlock</button>
    </form>

    <div class="status error hidden" id="loginStatus"></div>
  </div>

  <div class="panel hidden" id="adminScreen">
    <div class="admin-header">
      <div>
        <h1>Staff Donation Entry</h1>
        <p>Add donations here. The main display updates automatically.</p>
      </div>
    </div>

    <form id="donateForm">
      <div class="row">
        <label for="teamId">Team</label>
        <select id="teamId" required></select>
      </div>
      <div class="row">
        <label for="amount">Amount ($)</label>
        <div class="controls">
          <input id="amount" type="number" min="0.01" step="0.01" placeholder="25.00" required />
          <button type="submit">Add</button>
        </div>
      </div>
    </form>

    <button class="reset" id="resetBtn" type="button">Reset all teams</button>
    <button class="logout" id="logoutBtn" type="button">Log out</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const loginScreen = document.getElementById("loginScreen");
    const adminScreen = document.getElementById("adminScreen");
    const loginForm = document.getElementById("loginForm");
    const loginPassword = document.getElementById("loginPassword");
    const loginStatus = document.getElementById("loginStatus");
    const teamSelect = document.getElementById("teamId");
    const form = document.getElementById("donateForm");
    const status = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const currency = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const SESSION_KEY = "vbsStaffSecret";
    let requiresAuth = false;
    let staffSecret = "";

    function setStaffSecret(secret) {
      staffSecret = secret;
      sessionStorage.setItem(SESSION_KEY, secret);
    }

    function clearStaffSecret() {
      staffSecret = "";
      sessionStorage.removeItem(SESSION_KEY);
    }

    function authHeaders() {
      if (!requiresAuth) return {};
      return { "X-Staff-Secret": staffSecret };
    }

    function showLogin(message = "") {
      loginScreen.classList.remove("hidden");
      adminScreen.classList.add("hidden");
      loginStatus.textContent = message;
      loginStatus.classList.toggle("hidden", !message);
      loginPassword.value = "";
      loginPassword.focus();
    }

    function showAdmin() {
      loginScreen.classList.add("hidden");
      adminScreen.classList.remove("hidden");
      loginStatus.classList.add("hidden");
      status.textContent = "";
    }

    async function verifyPassword(password) {
      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      return response.ok;
    }

    async function apiPost(url, body) {
      return fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...authHeaders()
        },
        body: JSON.stringify(body)
      });
    }

    async function loadConfig() {
      const response = await fetch("/api/config", { cache: "no-store" });
      const config = await response.json();
      requiresAuth = config.requiresAuth;
    }

    async function loadTeams() {
      const response = await fetch("/api/state", { cache: "no-store" });
      const state = await response.json();
      teamSelect.innerHTML = state.teams
        .map((team) => `<option value="${team.id}">${team.emoji} ${team.name} (${currency.format(team.total)})</option>`)
        .join("");
    }

    async function unlockAdmin(password) {
      if (!requiresAuth) {
        showAdmin();
        await loadTeams();
        return true;
      }

      const ok = await verifyPassword(password);
      if (!ok) {
        showLogin("Wrong password. Try again.");
        return false;
      }

      setStaffSecret(password);
      showAdmin();
      await loadTeams();
      return true;
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await unlockAdmin(loginPassword.value);
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const teamId = teamSelect.value;
      const amount = Number(document.getElementById("amount").value);

      const response = await apiPost("/api/donate", { teamId, amount });

      if (response.status === 401) {
        clearStaffSecret();
        showLogin("Session expired. Please log in again.");
        return;
      }

      if (!response.ok) {
        status.textContent = "Could not add donation.";
        status.className = "status error";
        return;
      }

      document.getElementById("amount").value = "";
      status.className = "status";
      status.textContent = "Donation added!";
      await loadTeams();
    });

    resetBtn.addEventListener("click", async () => {
      if (!confirm("Reset all team totals to $0?")) return;

      const response = await apiPost("/api/reset", {});

      if (response.status === 401) {
        clearStaffSecret();
        showLogin("Session expired. Please log in again.");
        return;
      }

      if (!response.ok) {
        status.textContent = "Could not reset teams.";
        status.className = "status error";
        return;
      }

      status.className = "status";
      status.textContent = "All teams reset.";
      await loadTeams();
    });

    logoutBtn.addEventListener("click", () => {
      clearStaffSecret();
      showLogin();
    });

    async function init() {
      await loadConfig();

      if (!requiresAuth) {
        showAdmin();
        await loadTeams();
        logoutBtn.classList.add("hidden");
        return;
      }

      const savedSecret = sessionStorage.getItem(SESSION_KEY);
      if (savedSecret && await unlockAdmin(savedSecret)) {
        return;
      }

      showLogin();
    }

    init();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
